name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.6.2
  GODOT_STATUS: stable
  GODOT_PLATFORM: linux.x86_64

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Godot version labels
        run: |
          echo "GODOT_RELEASE=${GODOT_VERSION}-${GODOT_STATUS}" >> "$GITHUB_ENV"
          echo "GODOT_TEMPLATE_DIR=${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}" >> "$GITHUB_ENV"

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}-web

      - name: Install Godot and export templates
        run: |
          set -euo pipefail
          mkdir -p ~/.local/bin "$GODOT_TEMPLATE_DIR" /tmp/godot-download

          if [ ! -x ~/.local/bin/godot ]; then
            curl --location --retry 5 --retry-all-errors \
              --output /tmp/godot-download/godot.zip \
              "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_${GODOT_PLATFORM}.zip"
            unzip -q /tmp/godot-download/godot.zip -d /tmp/godot-download
            mv "/tmp/godot-download/Godot_v${GODOT_RELEASE}_${GODOT_PLATFORM}" ~/.local/bin/godot
            chmod +x ~/.local/bin/godot
          fi

          if [ ! -f "$GODOT_TEMPLATE_DIR/web_nothreads_release.zip" ]; then
            curl --location --retry 5 --retry-all-errors \
              --output /tmp/godot-download/export_templates.tpz \
              "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
            unzip -q /tmp/godot-download/export_templates.tpz -d /tmp/godot-download/templates
            cp /tmp/godot-download/templates/templates/web_nothreads_*.zip "$GODOT_TEMPLATE_DIR/"
          fi

          godot --version

      - name: Import assets
        run: godot --headless --path "$GITHUB_WORKSPACE" --import --quit

      - name: Export Web build
        run: |
          mkdir -p _site
          godot --headless --path "$GITHUB_WORKSPACE" --export-release Web "$GITHUB_WORKSPACE/_site/index.html"
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
